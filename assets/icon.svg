<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 背景：角丸正方形 -->
  <rect width="256" height="256" fill="#1e1e1e"/>

  <!-- ルーペのハンドル -->
  <line x1="157" y1="152" x2="218" y2="218" stroke="#e8e8e8" stroke-width="22" stroke-linecap="round"/>

  <!-- ルーペのレンズ（円形アウトライン） -->
  <circle cx="108" cy="102" r="68" fill="none" stroke="#e8e8e8" stroke-width="16"/>

  <!-- ASTのエッジ（ノードより先に描画） -->
  <line x1="108" y1="66" x2="76"  y2="99"  stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="108" y1="66" x2="140" y2="99"  stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="76"  y1="99" x2="57"  y2="133" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="76"  y1="99" x2="95"  y2="133" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="140" y1="99" x2="153" y2="133" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>

  <!-- ASTのノード -->
  <circle cx="108" cy="58"  r="12" fill="#e8e8e8"/>
  <circle cx="76"  cy="99"  r="11" fill="#e8e8e8"/>
  <circle cx="140" cy="99"  r="11" fill="#e8e8e8"/>
  <circle cx="57"  cy="133" r="9"  fill="#e8e8e8"/>
  <circle cx="95"  cy="133" r="9"  fill="#e8e8e8"/>
  <circle cx="153" cy="133" r="9"  fill="#e8e8e8"/>
</svg>
